[www]
user = www-data
group = www-data

; TCP socket — escuta em todas as interfaces para o nginx em container separado
; listen.owner/group/mode são apenas para Unix sockets e foram removidos
listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.max_requests = 500

; Permite que o nginx repasse variáveis de ambiente ao PHP-FPM
clear_env = no

; Redireciona stderr do worker para o log do PHP-FPM
catch_workers_output = yes
php_flag[display_errors] = off
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
