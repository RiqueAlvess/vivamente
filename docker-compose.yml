services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nr1_app
    restart: unless-stopped
    working_dir: /var/www
    # Forçar foreground explicitamente no compose também, independente do CMD do Dockerfile
    command: ["php-fpm", "-F"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - redis
    networks:
      - nr1_network
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    healthcheck:
      # Valida que PHP-FPM está escutando na porta 9000 usando o próprio PHP
      test: ["CMD-SHELL", "php -r 'exit((int)!@fsockopen(\"127.0.0.1\",9000,$$e,$$m,2));'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    container_name: nr1_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - nr1_network

  redis:
    image: redis:7-alpine
    container_name: nr1_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - nr1_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nr1_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - redis
    networks:
      - nr1_network
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1

networks:
  nr1_network:
    driver: bridge
